<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Charger Status — IMESAPI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Charger">
  <link rel="apple-touch-icon" href="/.netlify/functions/icon">
  <link rel="icon" id="favicon" type="image/png">
  <style>
    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,.4); }
      60%       { box-shadow: 0 0 0 10px rgba(74,222,128,0); }
    }
    @keyframes pulse-blue {
      0%, 100% { box-shadow: 0 0 0 0 rgba(96,165,250,.4); }
      60%       { box-shadow: 0 0 0 10px rgba(96,165,250,0); }
    }
    .glow-green { animation: pulse-green 2s infinite; }
    .glow-blue  { animation: pulse-blue  1.6s infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 min-h-screen text-white">

  <div class="max-w-2xl mx-auto px-4 py-12">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">
          <i class="fas fa-charging-station text-lg"></i>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">EV Charger Status</h1>
      </div>
      <p class="text-slate-400 text-sm mt-1">IMESAPI · Santa Cruz de Tenerife</p>
      <p id="ts" class="text-slate-600 text-xs mt-1">Loading…</p>
      <p id="sun" class="text-slate-700 text-xs mt-0.5"></p>
    </div>

    <!-- Cards -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- skeleton -->
      <div class="bg-slate-800/50 rounded-2xl h-36 animate-pulse"></div>
      <div class="bg-slate-800/50 rounded-2xl h-36 animate-pulse"></div>
      <div class="bg-slate-800/50 rounded-2xl h-36 animate-pulse"></div>
      <div class="bg-slate-800/50 rounded-2xl h-36 animate-pulse"></div>
    </div>

    <!-- Error banner -->
    <div id="err" class="hidden mt-6 bg-red-950/60 border border-red-800 rounded-xl px-4 py-3 text-sm text-red-300 text-center">
      <i class="fas fa-triangle-exclamation mr-2"></i><span id="err-msg"></span>
      <p class="text-xs text-red-500 mt-1">The upstream API may be temporarily unavailable. Try again in a moment.</p>
    </div>

    <!-- Refresh + Notify -->
    <div class="flex items-center justify-center gap-3 mt-8">
      <button id="btn" onclick="load()"
        class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all px-6 py-2 rounded-full text-sm font-medium shadow-lg disabled:opacity-40">
        <i id="ico" class="fas fa-sync-alt"></i>Refresh
      </button>
      <button id="notify-btn" onclick="toggleNotify()"
        class="hidden w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-95 shadow-lg"
        title="Notify me when a spot opens">
        <i id="notify-ico" class="fas fa-bell-slash text-sm"></i>
      </button>
    </div>
    <p id="notify-msg" class="hidden text-center text-xs mt-2"></p>

    <!-- Legend -->
    <div class="mt-8 flex flex-wrap justify-center gap-5 text-xs text-slate-400">
      <span class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full bg-green-500 flex items-center justify-center shrink-0">
          <i class="fas fa-plug text-white text-[11px]"></i>
        </span>Available
      </span>
      <span class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center shrink-0">
          <i class="fas fa-bolt text-white text-[11px]"></i>
        </span>Busy
      </span>
      <span class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full bg-gray-950 border border-gray-600 flex items-center justify-center shrink-0">
          <i class="fas fa-ban text-white text-[11px]"></i>
        </span>Unavailable
      </span>
      <span class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full bg-slate-950 border border-slate-600 flex items-center justify-center shrink-0">
          <i class="fas fa-moon text-slate-400 text-[11px]"></i>
        </span>Night closure
      </span>
    </div>

    <p class="text-center text-slate-700 text-xs mt-5">
      <i class="fas fa-clock mr-1"></i>Auto-refreshes every 30 s
    </p>
  </div>

  <script>
    const STATUS = {
      0: { label: 'Available',   es: 'Disponible',        bg: 'bg-green-500', glow: 'glow-green', icon: 'fa-plug', border: 'border-green-500/20' },
      1: { label: 'Busy',        es: 'Ocupado',           bg: 'bg-blue-500',  glow: 'glow-blue',  icon: 'fa-bolt', border: 'border-blue-500/20'  },
      2: { label: 'Reserved',    es: 'Reservado',         bg: 'bg-blue-500',  glow: 'glow-blue',  icon: 'fa-bolt', border: 'border-blue-500/20'  },
      3: { label: 'Unavailable', es: 'Fuera de servicio', bg: 'bg-gray-950',  glow: '',           icon: 'fa-ban',  border: 'border-gray-700/40'  },
      9: { label: 'Unavailable', es: 'Error',             bg: 'bg-gray-950',  glow: '',           icon: 'fa-ban',  border: 'border-gray-700/40'  },
    };

    const NIGHT_CLOSURE = {
      label: 'Night closure', es: 'Cierre nocturno',
      bg: 'bg-slate-950', glow: '', icon: 'fa-moon', border: 'border-slate-700/40',
    };

    const TARGETS       = ['IMESAPI - SELBA EdRSR 12', 'IMESAPI - SELBA EdRSR 16'];
    const NIGHT_STATION = 'IMESAPI - SELBA EdRSR 16';

    const PROXY_URL  = 'https://api.allorigins.win/get?url=' +
                       encodeURIComponent('https://etecnic.net/api/v1/chargers/index.json');
    const LOCAL_URLS = ['/.netlify/functions/chargers', '/api/chargers'];

    const SUN_URL = 'https://api.sunrise-sunset.org/json?lat=28.4636&lng=-16.2518&formatted=0';
    let sunCache = null;

    async function getSunTimes() {
      const today = new Date().toISOString().slice(0, 10);
      if (sunCache && sunCache.date === today) return sunCache;
      const r = await fetch(SUN_URL + '&date=' + today, { signal: AbortSignal.timeout(8000) });
      const { results, status } = await r.json();
      if (status !== 'OK') throw new Error('Sun API error');
      sunCache = { date: today, sunrise: new Date(results.sunrise), sunset: new Date(results.sunset) };
      return sunCache;
    }

    function isNight(sun) {
      const now = new Date();
      return now < sun.sunrise || now > sun.sunset;
    }

    function fmt(d) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function cfg(code) {
      return STATUS[code] ?? {
        label: 'Unknown', es: '—', bg: 'bg-slate-600', glow: '', icon: 'fa-question', border: 'border-slate-600/20'
      };
    }

    // ── Canvas favicon ──────────────────────────────────────────────
    // FontAwesome 6 Free Solid paths with their original viewBox sizes
    const ICON_SPECS = {
      plug: { d: 'M96 0C78.3 0 64 14.3 64 32v96h64V32c0-17.7-14.3-32-32-32zM288 0c-17.7 0-32 14.3-32 32v96h64V32c0-17.7-14.3-32-32-32zM32 160c-17.7 0-32 14.3-32 32s14.3 32 32 32H48v32c0 77.4 55 142 128 156.8V480c0 17.7 14.3 32 32 32s32-14.3 32-32V412.8C313 398 368 333.4 368 256V224h16c17.7 0 32-14.3 32-32s-14.3-32-32-32H32z', vw: 384, vh: 512 },
      bolt: { d: 'M349.4 44.6c5.9-13.7 1.5-29.7-10.6-38.5s-28.6-8-39.9 1.8l-256 224c-10 8.8-13.6 22.9-8.9 35.3S50.7 288 64 288H175.5L98.6 467.4c-5.9 13.7-1.5 29.7 10.6 38.5s28.6 8 39.9-1.8l256-224c10-8.8 13.6-22.9 8.9-35.3s-16.6-20.7-29.9-20.7H272.5L349.4 44.6z', vw: 448, vh: 512 },
      ban:  { d: 'M367.2 412.5L99.5 144.8C77.1 176.1 64 214.5 64 256c0 106 86 192 192 192c41.5 0 79.9-13.1 111.2-35.5zm45.3-45.3C434.9 335.9 448 297.5 448 256c0-106-86-192-192-192c-41.5 0-79.9 13.1-111.2 35.5L412.5 367.2zM0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256z', vw: 512, vh: 512 },
      moon: { d: 'M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.2c-6.3-.3-12.6-.4-19-.4z', vw: 384, vh: 512 },
    };

    let _paths;
    function iconPath(name) {
      if (!_paths) _paths = Object.fromEntries(
        Object.entries(ICON_SPECS).map(([k, v]) => [k, new Path2D(v.d)])
      );
      return _paths[name];
    }

    function iconForStatus(status, night) {
      if (night)                      return { bg: '#0f172a', name: 'moon', vw: 384, vh: 512, fg: '#94a3b8' };
      if (status === 0)               return { bg: '#22c55e', name: 'plug', vw: 384, vh: 512, fg: '#ffffff' };
      if (status === 1 || status === 2) return { bg: '#3b82f6', name: 'bolt', vw: 448, vh: 512, fg: '#ffffff' };
      return                                 { bg: '#1c1917', name: 'ban',  vw: 512, vh: 512, fg: '#ffffff' };
    }

    function rrect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + r,     r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x,      y + h, x, y + h - r,    r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x,      y,     x + r, y,         r);
      ctx.closePath();
    }

    function drawFavicon(socketInfos) {
      const S = 192, GAP = 8, CELL = (S - GAP * 3) / 2, CR = 12;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = S;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#1e293b';
      rrect(ctx, 0, 0, S, S, 24);
      ctx.fill();

      socketInfos.forEach(({ status, night }, i) => {
        const x = GAP + (i % 2) * (CELL + GAP);
        const y = GAP + Math.floor(i / 2) * (CELL + GAP);
        const { bg, name, vw, vh, fg } = iconForStatus(status, night);

        ctx.fillStyle = bg;
        rrect(ctx, x, y, CELL, CELL, CR);
        ctx.fill();

        const maxIcon = CELL * 0.55;
        const scale = maxIcon / Math.max(vw, vh);
        const tx = x + (CELL - vw * scale) / 2;
        const ty = y + (CELL - vh * scale) / 2;
        ctx.save();
        ctx.translate(tx, ty);
        ctx.scale(scale, scale);
        ctx.fillStyle = fg;
        ctx.fill(iconPath(name));
        ctx.restore();
      });

      document.getElementById('favicon').href = canvas.toDataURL();
    }
    // ────────────────────────────────────────────────────────────────

    function card(station, socket, night = false) {
      const c = night ? NIGHT_CLOSURE : cfg(socket.status);
      const textColor = c.bg.replace('bg-', 'text-');
      const iconColor = night ? 'text-slate-400' : 'text-white';
      return `
        <div class="bg-slate-800/70 border ${c.border} rounded-2xl p-5 flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-semibold uppercase tracking-widest text-slate-500 mb-1">Socket ${socket.socket_number}</p>
            <h2 class="text-sm font-semibold text-white leading-snug">${station.name}</h2>
            <p class="text-xs text-slate-400 mt-1 truncate">${station.address}</p>
            <p class="mt-3 text-sm font-bold ${textColor}">${c.label}</p>
            <p class="text-[10px] text-slate-600">${c.es}</p>
          </div>
          <div class="w-14 h-14 shrink-0 rounded-full ${c.bg} border border-slate-700/30 ${c.glow} flex items-center justify-center shadow-lg">
            <i class="fas ${c.icon} ${iconColor} text-xl"></i>
          </div>
        </div>`;
    }

    function render(data, sun) {
      const night = sun ? isNight(sun) : false;
      const stations = data
        .filter(s => TARGETS.includes(s.name))
        .sort((a, b) => a.name.localeCompare(b.name));

      if (!stations.length) throw new Error('Target stations not found in API response');

      const cards = [], favIcons = [];
      stations.forEach(s => {
        const forceNight = night && s.name === NIGHT_STATION;
        s.charger_sockets
          .sort((a, b) => a.socket_number - b.socket_number)
          .slice(0, 2)
          .forEach(sk => {
            cards.push(card(s, sk, forceNight));
            favIcons.push({ status: sk.status, night: forceNight });
          });
      });

      document.getElementById('grid').innerHTML = cards.join('');
      document.getElementById('ts').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      document.getElementById('sun').textContent = sun
        ? `☀️ Sunrise ${fmt(sun.sunrise)} · 🌙 Sunset ${fmt(sun.sunset)}`
        : '';
      document.getElementById('err').classList.add('hidden');
      drawFavicon(favIcons);

      // Push latest status to SW so it can serve a fresh /icon on next request
      if (navigator.serviceWorker && navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'STATUS_UPDATE', sockets: favIcons });
      }
    }

    async function tryLocal() {
      for (const url of LOCAL_URLS) {
        try {
          const r = await fetch(url, { signal: AbortSignal.timeout(5000) });
          if (r.ok) return r.json();
        } catch {}
      }
      throw new Error('No local proxy available');
    }

    async function tryProxy() {
      const r = await fetch(PROXY_URL, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error(`Proxy HTTP ${r.status}`);
      const wrap = await r.json();
      return JSON.parse(wrap.contents);
    }

    async function load() {
      const btn = document.getElementById('btn');
      const ico = document.getElementById('ico');
      btn.disabled = true;
      ico.style.transition = 'transform .5s ease';
      ico.style.transform = 'rotate(360deg)';
      setTimeout(() => { ico.style.transition = ''; ico.style.transform = ''; }, 550);

      try {
        const [dataResult, sunResult] = await Promise.allSettled([
          (async () => {
            const d = await tryLocal().catch(() => null);
            return d ?? await tryProxy();
          })(),
          getSunTimes(),
        ]);

        if (dataResult.status === 'rejected') throw dataResult.reason;
        const sun = sunResult.status === 'fulfilled' ? sunResult.value : null;
        render(dataResult.value, sun);
      } catch (e) {
        document.getElementById('err-msg').textContent = e.message;
        document.getElementById('err').classList.remove('hidden');
        document.getElementById('ts').textContent = 'Failed — ' + new Date().toLocaleTimeString();
        document.getElementById('grid').innerHTML = '';
      } finally {
        btn.disabled = false;
      }
    }

    load();
    setInterval(load, 30_000);

    // ── Web Push notifications ───────────────────────────────────────
    const VAPID_PUBLIC = 'BKjU05zV18M_uXynTIT5UYr_DeMdjFMB8pVBkbUr8_rIalzoBlzg-xCPp_S6yHn_p9Vs7IlJhLodgZ8aSrkZVzQ';

    function urlB64ToUint8(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const b = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
      return Uint8Array.from([...b].map(c => c.charCodeAt(0)));
    }

    async function getSub() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
      const reg = await navigator.serviceWorker.ready;
      return reg.pushManager.getSubscription();
    }

    async function updateNotifyUI() {
      const btn = document.getElementById('notify-btn');
      const ico = document.getElementById('notify-ico');
      const msg = document.getElementById('notify-msg');
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

      btn.classList.remove('hidden');
      const sub = await getSub();

      if (Notification.permission === 'denied') {
        btn.className = btn.className.replace('hidden', '') + ' bg-slate-800 opacity-40 cursor-not-allowed';
        btn.title = 'Notifications blocked — enable in browser settings';
        ico.className = 'fas fa-bell-slash text-sm text-slate-500';
        return;
      }

      if (sub) {
        btn.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-95 shadow-lg bg-blue-600 hover:bg-blue-500';
        btn.title = 'Notifications on — tap to turn off';
        ico.className = 'fas fa-bell text-sm text-white';
      } else {
        btn.className = 'w-10 h-10 rounded-full flex items-center justify-center transition-all active:scale-95 shadow-lg bg-slate-700 hover:bg-slate-600';
        btn.title = 'Notify me when a spot opens';
        ico.className = 'fas fa-bell-slash text-sm text-slate-300';
      }
      msg.classList.add('hidden');
    }

    async function toggleNotify() {
      const msg = document.getElementById('notify-msg');
      const sub = await getSub();
      try {
        if (sub) {
          await fetch('/.netlify/functions/unsubscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ endpoint: sub.endpoint }),
          });
          await sub.unsubscribe();
        } else {
          const reg = await navigator.serviceWorker.ready;
          const newSub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlB64ToUint8(VAPID_PUBLIC),
          });
          const r = await fetch('/.netlify/functions/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(newSub),
          });
          if (!r.ok) throw new Error('server error');
          msg.textContent = "You'll be notified when a spot opens.";
          msg.className = 'text-center text-xs mt-2 text-slate-400';
        }
      } catch (e) {
        msg.textContent = 'Could not update notifications: ' + e.message;
        msg.className = 'text-center text-xs mt-2 text-red-400';
      }
      updateNotifyUI();
    }
    // ────────────────────────────────────────────────────────────────

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => {
          updateNotifyUI();
          reg.update(); // re-check manifest + icon on every page visit
        })
        .catch(() => {});
    }
  </script>

</body>
</html>
